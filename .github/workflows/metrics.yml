name: Update Profile Metrics
on:
  schedule:
    - cron: "0 0 * * *" # Updates automatically every day at midnight
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          
          # Core configurations
          base: header, activity, community, repositories
          
          # Language breakdown plugin
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_categories: programming, markup, data
          plugin_languages_limit: 8
